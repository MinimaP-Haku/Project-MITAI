<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project MITAI - Loading</title>
    <script src="../../core_init.js"></script>
    <link rel="stylesheet" href="style_loading.css">
</head>
<body>
    <div id="loading-container">
        <h1 id="status-text">INITIALIZING PROJECT MITAI...</h1>
        <div class="progress-border">
            <div id="progress-fill"></div>
        </div>
        <p id="loading-details">Accessing internal core...</p>
    </div>
    <div id="notice-finished" class="full-modal" style="display: none;">
        <div class="modal-box">
            <h1>SYSTEM MESSAGE</h1>
            <p>Loading successful, click the button to continue.</p>
            <p>Project MITAI is still in Alpha Build.</p>
            <br>
            <button onclick="handleReturn()" class="cyber-button">to MITAI Pod</button>
        </div>
    </div>

    <audio id="loadingMusic" loop>
        <source src="../../assets/sounds/music/loading.mp3" type="audio/mpeg">
    </audio>
    <audio id="sndNotify" src="../../assets/sounds/ui/notification/notification_received_01.wav"></audio>
    <audio id="sndNotifAccept" src="../../assets/sounds/ui/notification/notification_accept_01.wav"></audio>

    <script src="script_loading.js"></script>
</body>
</html>
